<!-- competitions/templates/competitions/export_modal.html -->
<div class="export-modal-container">
    <div class="export-modal-header">
        <h3 class="header-sm">Экспорт результатов</h3>
        <button class="export-modal-close modal-close">
            <img src="/static/images/cross.svg" alt="Закрыть">
        </button>
    </div>

    <div class="export-modal-body">
        <div class="export-format-group">
            <div class="radio-group">
                <div class="radio-group-label">Формат:</div>
                <div class="radio-options-row">
                    <label class="radio-option">
                        <input type="radio" name="export_format" value="pdf" checked>
                        <span>PDF</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="export_format" value="excel">
                        <span>Excel</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="export-entries-group">
            <div class="radio-group-label">Выберите зачёты:</div>
            <div class="export-entries-list" id="export-entries-list">
                <div class="export-loading body-text-sm color-gray-middle">Загрузка...</div>
            </div>
        </div>

        <div class="export-error" id="export-error" style="display: none;"></div>
    </div>

    <div class="export-modal-footer">
        <button class="btn btn-secondary btn-s export-cancel-btn">Отмена</button>
        <button class="btn btn-primary btn-s export-confirm-btn">Скачать</button>
    </div>
</div>
