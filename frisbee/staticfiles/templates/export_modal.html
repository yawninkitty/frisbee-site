<!-- competitions/templates/competitions/export_modal.html -->
<div class="export-modal-container">
    <div class="export-modal-header">
        <h3>📥 Экспорт результатов</h3>
        <button class="export-modal-close">&times;</button>
    </div>

    <div class="export-modal-body">
        <div class="export-format-group">
            <label class="export-label">Формат:</label>
            <div class="export-radio-group">
                <label>
                    <input type="radio" name="export_format" value="pdf" checked>
                    <span>📄 PDF</span>
                </label>
                <label>
                    <input type="radio" name="export_format" value="excel">
                    <span>📊 Excel</span>
                </label>
            </div>
        </div>

        <div class="export-entries-group">
            <label class="export-label">Выберите зачёты:</label>
            <div class="export-entries-list" id="export-entries-list">
                <!-- Сюда будут загружены зачёты -->
                <div class="export-loading">Загрузка...</div>
            </div>
        </div>

        <div class="export-error" id="export-error" style="display: none;"></div>
    </div>

    <div class="export-modal-footer">
        <button class="btn-secondary export-cancel-btn">Отмена</button>
        <button class="btn-primary export-confirm-btn">Скачать</button>
    </div>
</div>

<style>
    .export-modal-container {
        background: white;
        border-radius: 16px;
        max-width: 500px;
        width: 90%;
        animation: exportModalFadeIn 0.2s ease;

            opacity: 0;

    .export-modal-header {

        margin: 0;
        font-size: 18px;
        color: #2c3e50;
    }

        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #999;
        transition: color 0.2s;
        line-height: 1;
        padding: 0;
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .export-modal-close:hover {
        color: #dc3545;
    }

    .export-modal-body {
        padding: 20px 24px;
    }

    .export-format-group {
        margin-bottom: 24px;
    }

    .export-label {
        display: block;
        font-weight: 600;
        margin-bottom: 10px;
        color: #2c3e50;
        font-size: 14px;
    }

    .export-radio-group {

        gap: 24px;
    }

        gap: 8px;

        font-size: 14px;
    }

    .export-radio-group input[type="radio"] {
        width: 16px;
        height: 16px;
        cursor: pointer;
        margin: 0;
    }

    .export-entries-group {
        margin-bottom: 20px;
    }

    .export-entries-list {
        max-height: 300px;
        overflow-y: auto;

    }

    }

</style>
