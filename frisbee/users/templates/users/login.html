{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% load static %}

{% block content %}
<div class="auth-container container">
    <div class="auth-card">
        <h1 class="header-md">Вход</h1>

        <form method="post" class="auth-form">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.GET.next }}">

            <div class="floating-label-group">
                <input type="text" name="username" id="id_username" class="input" placeholder=" " required>
                <label>Логин</label>
            </div>

            <div class="floating-label-group password-field">
                <input type="password" name="password" id="id_password" class="input" placeholder=" " required>
                <label>Пароль</label>
                <button type="button" class="password-toggle" data-target="id_password">
                    <img src="{% static 'images/eye.svg' %}" alt="Показать пароль">
                </button>
            </div>

            {% if form.errors %}
            <div class="auth-error">
                <p class="body-text-sm">Неверное имя пользователя или пароль.</p>
            </div>
            {% endif %}

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-l">Войти</button>
                <a href="{% url 'sign_up' %}?next={{ request.GET.next }}" class="btn btn-secondary btn-l">Зарегистрироваться</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
