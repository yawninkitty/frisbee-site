<!-- templates/users/dog_add_edit_modal.html -->
{% load static %}

<!-- Оверлей для затемнения фона -->
<div id="dog-modal-overlay" class="modal-overlay" style="display:none;"></div>

<!-- Модальное окно для добавления/редактирования собаки -->
<div id="dog-modal" class="modal-container" style="display:none;">
    <div class="modal-header">
        <h3 id="dog-modal-title" class="header-md">Добавить собаку</h3>
        <button id="cross-close-modal" class="modal-close">
            <img src="{% static 'images/cross.svg' %}" alt="Закрыть">
        </button>
    </div>
    <form id="dog-form" class="form-container" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="hidden" id="dog-id" name="dog_id" value="">

        <div class="floating-label-group">
            <input type="text" name="name" id="dog-name" class="input" placeholder=" " required>
            <label>Кличка *</label>
        </div>

        <div class="floating-label-group">
            <input type="text" name="breed" id="dog-breed" class="input" placeholder=" ">
            <label>Порода</label>
        </div>

        <div class="floating-label-group">
            <input type="text" name="birth_date" id="dog-birth-date" class="input" placeholder=" ">
            <label>Дата рождения</label>
        </div>

        <!-- Пол - радио-кнопки в ряд -->
        <div class="radio-group">
            <div class="radio-group-label">Пол</div>
            <div class="radio-options-row">
                <label class="radio-option">
                    <input type="radio" name="gender" value="male">
                    <span>Кобель</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="gender" value="female">
                    <span>Сука</span>
                </label>
            </div>
        </div>

        <div class="floating-label-group">
            <input type="number" step="0.1" name="height" id="dog-height" class="input" placeholder=" ">
            <label>Рост (см)</label>
        </div>

        <!-- Класс - радио-кнопки -->
        <div class="radio-group">
            <div class="radio-group-label">Класс *</div>
            <div class="radio-options-row">
                <label class="radio-option">
                    <input type="radio" name="sport_class_dog" value="novice">  <!-- ← изменено -->
                    <span>Новички</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="sport_class_dog" value="progress">  <!-- ← изменено -->
                    <span>Прогресс</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="sport_class_dog" value="open">  <!-- ← изменено -->
                    <span>Открытый</span>
                </label>
            </div>
        </div>

        <div class="file-upload-group">
            <div class="avatar-container">
                <div class="avatar-preview" id="avatar-preview">
                    <img id="avatar-preview-img" src="{% static 'images/dog_avatar_placeholder.svg' %}" alt="Аватар">
                    <div class="avatar-overlay">
                        <span class="avatar-edit-icon">✏️</span>
                        <span class="avatar-delete-icon">🗑️</span>
                    </div>
                </div>
                <input type="file" name="avatar" id="dog-avatar" accept="image/*" style="display: none;">
            </div>
            <input type="hidden" id="delete-avatar-flag" value="false">
        </div>

        <div id="dog-form-error" style="color: red; display: none; margin-top: var(--spacing-sm);"></div>

        <div class="modal-actions">
            <button type="submit" class="btn btn-primary btn-l">Сохранить</button>
            <button type="button" id="close-dog-modal" class="btn btn-secondary btn-l">Отмена</button>
            <button type="button" id="delete-dog-btn" class="btn btn-secondary btn-l" style="display: none;">Удалить</button>
        </div>
    </form>
</div>
