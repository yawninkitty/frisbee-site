{% extends 'base.html' %}
{% load static %}

{% block title %}Регистрация завершена{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="header-md">Регистрация завершена</h1>

        <div class="success-message">
            <p>Добро пожаловать, <strong>{{ username }}</strong>!</p>
            <p>Ваш аккаунт успешно создан.</p>
        </div>

        <div class="success-actions">
            <a href="{% url 'login' %}?next={{ request.GET.next }}" class="btn btn-primary btn-l">Перейти ко входу</a>
        </div>
    </div>
</div>
{% endblock %}
