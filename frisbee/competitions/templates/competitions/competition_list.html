{% extends 'base.html' %}
{% load static %}

{% block title %}Соревнования{% endblock %}

{% block content %}

    <section class="search-competitions">
        <!-- Панель поиска и фильтров -->
        <div class="search-filters-panel container">
            <div class="search-header">
                <h1 class="header-lg">Соревнования</h1>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Поиск по названию..." class="input search-input">
                </div>
            </div>

            <!-- Кнопка "Фильтры" (только на мобилке) -->
            <button id="mobile-filter-btn" class="mobile-filter-btn">
                <img src="{% static 'images/filter.svg' %}" alt="Фильтры"> Фильтры
            </button>

            <!-- Мобильное окно фильтров -->
            <div id="mobile-filter-overlay" class="mobile-filter-overlay" style="display: none;"></div>
            <div id="mobile-filter-panel" class="mobile-filter-panel" style="display: none;">
                <div class="mobile-filter-header">
                    <h3 class="header-md">Все фильтры</h3>
                    <button id="close-mobile-filter" class="modal-close">
                        <img src="{% static 'images/cross.svg' %}" alt="Закрыть">
                    </button>
                </div>
                <div class="mobile-filter-content" id="mobile-filter-content">
                    <!-- Фильтры-чипы -->
                    <p class="header-sm">Дисциплина</p>
                    <div class="filters-row">
                        <div class="filter-group">
                            <div class="chips-container" id="mobile-discipline-chips">
                                <button class="chip" data-filter="discipline" data-value="bullseye">Буллсай</button>
                                <button class="chip" data-filter="discipline" data-value="distance">Броски на дальность</button>
                                <button class="chip" data-filter="discipline" data-value="accuracy">Броски на точность</button>
                            </div>
                        </div>

                        <p class="header-sm">Класс</p>
                        <div class="filter-group">
                            <div class="chips-container" id="mobile-class-chips">
                                <button class="chip" data-filter="class" data-value="novice">Новички</button>
                                <button class="chip" data-filter="class" data-value="progress">Прогресс</button>
                                <button class="chip" data-filter="class" data-value="open">Открытый</button>
                            </div>
                        </div>

                        <p class="header-sm">Актуальность</p>
                        <div class="filter-group">
                            <div class="chips-container" id="mobile-period-chips">
                                <button class="chip" data-filter="period" data-value="upcoming">Предстоящие</button>
                                <button class="chip" data-filter="period" data-value="past">Прошедшие</button>
                            </div>
                        </div>
                    </div>

                    <p class="header-sm">Другие данные</p>
                    <!-- Выпадающие фильтры -->
                    <div class="dropdown-filters-row" style="flex-direction: column;">
                        <div class="dropdown-filter">
                            <button class="dropdown-btn" data-dropdown="mobile-date-dropdown">
                                <span class="btn-text">Дата проведения </span>
                                <img src="{% static 'images/down_small.svg' %}" alt="▼" class="dropdown-arrow">
                            </button>
                            <div id="mobile-date-dropdown" class="dropdown-content">
                                <div class="date-range">
                                    <label>С:</label>
                                    <input type="text" id="mobile-date-from" class="date-input" placeholder="дд.мм.гггг">
                                </div>
                                <div class="date-range">
                                    <label>По:</label>
                                    <input type="text" id="mobile-date-to" class="date-input" placeholder="дд.мм.гггг">
                                </div>
                                <button id="mobile-clear-dates" class="clear-btn">Очистить</button>
                            </div>
                        </div>

                        <div class="dropdown-filter">
                            <button class="dropdown-btn" data-dropdown="mobile-venue-dropdown">
                                <span class="btn-text">Тип площадки </span>
                                <img src="{% static 'images/down_small.svg' %}" alt="▼" class="dropdown-arrow">
                            </button>
                            <div id="mobile-venue-dropdown" class="dropdown-content">
                                <label class="checkbox-label">
                                    <input type="checkbox" class="venue-checkbox" data-venue="outdoor"> Уличная
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" class="venue-checkbox" data-venue="indoor"> Крытая
                                </label>
                            </div>
                        </div>

                        <div class="dropdown-filter">
                            <button class="dropdown-btn" data-dropdown="mobile-city-dropdown">
                                <span class="btn-text">Город </span>
                                <img src="{% static 'images/down_small.svg' %}" alt="▼" class="dropdown-arrow">
                            </button>
                            <div id="mobile-city-dropdown" class="dropdown-content">
                                <div id="mobile-city-list"></div>
                            </div>
                        </div>

                        <div class="dropdown-filter">
                            <button class="dropdown-btn" data-dropdown="mobile-organizer-dropdown">
                                <span class="btn-text">Организатор </span>
                                <img src="{% static 'images/down_small.svg' %}" alt="▼" class="dropdown-arrow">
                            </button>
                            <div id="mobile-organizer-dropdown" class="dropdown-content">
                                <div id="mobile-organizer-list"></div>
                            </div>
                        </div>
                    </div>


                </div>
                <div class="mobile-filter-actions">
                    <button id="apply-mobile-filter" class="btn btn-primary btn-l">Применить фильтры</button>
                    <button id="mobile-clear-all-filters" class="clear-all-btn btn btn-l btn-secondary" style="width:100%;">Очистить все фильтры</button>
                </div>
            </div>

            <div class="filter-container">
                <!-- Фильтры-чипы (множественный выбор) -->
                <div class="filters-row">
                    <div class="filter-group">
                        <div class="chips-container" id="discipline-chips">
                            <button class="chip" data-filter="discipline" data-value="bullseye">Буллсай</button>
                            <button class="chip" data-filter="discipline" data-value="distance">Броски на дальность</button>
                            <button class="chip" data-filter="discipline" data-value="accuracy">Броски на точность</button>
                            <img src="{% static 'images/search_line_gray_border.svg' %}" alt="Разделитель">
                        </div>
                    </div>

                    <div class="filter-group">
                        <div class="chips-container" id="class-chips">
                            <button class="chip" data-filter="class" data-value="novice">Новички</button>
                            <button class="chip" data-filter="class" data-value="progress">Прогресс</button>
                            <button class="chip" data-filter="class" data-value="open">Открытый</button>
                            <img src="{% static 'images/search_line_gray_border.svg' %}" alt="Разделитель">
                        </div>
                    </div>

                    <div class="filter-group">
                        <div class="chips-container" id="period-chips">
                            <button class="chip" data-filter="period" data-value="upcoming">Предстоящие</button>
                            <button class="chip" data-filter="period" data-value="past">Прошедшие</button>
                        </div>
                    </div>
                </div>

                <!-- Выпадающие фильтры -->
                <div class="dropdown-filters-row">
                    <div class="dropdown-filter">
                        <button class="dropdown-btn" data-dropdown="date-dropdown">
                            <span class="btn-text">Дата проведения </span>
                            <img src="{% static 'images/down_small.svg' %}" alt="▼" class="dropdown-arrow">
                        </button>
                        <div id="date-dropdown" class="dropdown-content">
                            <div class="date-range">
                                <label>С:</label>
                                <input type="text" id="date-from" class="date-input" placeholder="дд.мм.гггг">
                            </div>
                            <div class="date-range">
                                <label>По:</label>
                                <input type="text" id="date-to" class="date-input" placeholder="дд.мм.гггг">
                            </div>
                            <button id="clear-dates" class="clear-btn">Очистить</button>
                        </div>
                    </div>

                    <div class="dropdown-filter">
                        <button class="dropdown-btn" data-dropdown="venue-dropdown">
                            <span class="btn-text">Тип площадки </span>
                            <img src="{% static 'images/down_small.svg' %}" alt="▼" class="dropdown-arrow">
                        </button>
                        <div id="venue-dropdown" class="dropdown-content">
                            <label class="checkbox-label">
                                <input type="checkbox" class="venue-checkbox" data-venue="outdoor"> Уличная
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" class="venue-checkbox" data-venue="indoor"> Крытая
                            </label>
                        </div>
                    </div>

                    <div class="dropdown-filter">
                        <button class="dropdown-btn" data-dropdown="city-dropdown">
                            <span class="btn-text">Город </span>
                            <img src="{% static 'images/down_small.svg' %}" alt="▼" class="dropdown-arrow">
                        </button>
                        <div id="city-dropdown" class="dropdown-content">
                            <div id="city-list"></div>
                        </div>
                    </div>

                    <div class="dropdown-filter">
                        <button class="dropdown-btn" data-dropdown="organizer-dropdown">
                            <span class="btn-text">Организатор </span>
                            <img src="{% static 'images/down_small.svg' %}" alt="▼" class="dropdown-arrow">
                        </button>
                        <div id="organizer-dropdown" class="dropdown-content">
                            <div id="organizer-list"></div>
                        </div>
                    </div>
                </div>
                <div class="results-header">
                    <button id="clear-all-filters" class="clear-all-btn btn btn-s btn-secondary">Очистить все фильтры</button>
                </div>
            </div>
            <img class="search-illustration" src="{% static 'images/dog_search.svg' %}" alt="Иллюстрация собаки">
        </div>

        <!-- Результаты -->
        <div class="container">
            <div id="competitions-container" class="competitions-grid">
                <!-- Сюда будут загружаться карточки -->
            </div>

            <!-- Пустая выдача -->
            <div id="competitions-empty" class="articles-empty" style="display: none;">
                <img src="{% static 'images/dog_fell.svg' %}" alt="Соревнований нет">
                <p class="body-text-lg color-gray-middle">Соревнований не найдено</p>
            </div>

            <!-- Загрузчик -->
            <div id="loader" class="loader" style="display: none;">Загрузка...</div>
        </div>
    </section>

    {% load static %}
    <script>
        window.csrfToken = "{{ csrf_token }}";
    </script>
    <script src="{% static 'js/competition_search.js' %}?v=8"></script>
{% endblock %}
